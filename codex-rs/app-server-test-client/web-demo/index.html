<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex HTTP Bridge Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 18px;
        background: #f6f6f6;
        color: #111;
      }
      .app {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 16px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .card {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 12px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      }
      .sidebar {
        display: grid;
        gap: 10px;
      }
      .row {
        display: grid;
        gap: 8px;
      }
      .btn-row {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: max-content;
        gap: 8px;
      }
      label {
        font-size: 12px;
        color: #444;
      }
      input, textarea, button {
        font-size: 14px;
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      textarea {
        min-height: 70px;
        resize: vertical;
      }
      button {
        background: #111;
        color: #fff;
        border-color: #111;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: #111;
      }
      .muted {
        color: #666;
        font-size: 12px;
      }
      .thread-list {
        display: grid;
        gap: 6px;
        max-height: 420px;
        overflow: auto;
        border-top: 1px solid #eee;
        padding-top: 8px;
      }
      .thread-item {
        padding: 8px;
        border: 1px solid #eee;
        border-radius: 6px;
        cursor: pointer;
      }
      .thread-item.active {
        border-color: #111;
        background: #fafafa;
      }
      .main {
        display: grid;
        gap: 12px;
      }
      .chat {
        display: grid;
        gap: 10px;
        max-height: 520px;
        overflow: auto;
      }
      .msg {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #eee;
        white-space: pre-wrap;
      }
      .msg.user {
        background: #f1f1f1;
      }
      .msg.assistant {
        background: #fff;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .question {
        border: 1px dashed #aaa;
        border-radius: 8px;
        padding: 10px;
        margin-top: 8px;
      }
      .options {
        display: grid;
        gap: 4px;
        margin: 6px 0;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar card">
        <div class="row">
          <div><strong>Bridge</strong></div>
          <div class="btn-row">
            <button id="startBridgeBtn">Start</button>
            <button id="stopBridgeBtn" class="secondary">Stop</button>
          </div>
          <div class="muted" id="bridgeStatus">Status: unknown</div>
        </div>

        <div class="row">
          <div><strong>Threads</strong></div>
          <div class="btn-row">
            <button id="newThreadBtn">New Chat</button>
            <button id="refreshThreadsBtn" class="secondary">Refresh</button>
          </div>
          <div class="muted" id="threadInfo">No active thread</div>
          <div class="thread-list" id="threadList"></div>
          <div class="btn-row">
            <button id="prevPageBtn" class="secondary">Prev</button>
            <button id="nextPageBtn" class="secondary">Next</button>
          </div>
        </div>
      </aside>

      <main class="main">
        <div class="card chat" id="chatArea"></div>

        <div class="card row">
          <label>Message</label>
          <textarea id="messageInput"></textarea>
          <div class="btn-row">
            <button id="sendBtn">Send</button>
            <button id="clearBtn" class="secondary">Clear</button>
          </div>
        </div>

        <div class="card row">
          <div><strong>Tool Input</strong></div>
          <div id="toolArea" class="muted">No tool requests yet.</div>
        </div>
      </main>
    </div>

    <script>
      const BASE_URL = window.location.origin.startsWith("http")
        ? window.location.origin
        : "http://127.0.0.1:7100";

      const chatArea = document.getElementById("chatArea");
      const toolArea = document.getElementById("toolArea");
      const messageInput = document.getElementById("messageInput");
      const threadInfo = document.getElementById("threadInfo");
      const threadListEl = document.getElementById("threadList");
      const bridgeStatusEl = document.getElementById("bridgeStatus");

      const PAGE_SIZE = 10;
      let currentPage = 0;
      let currentThreadId = null;
      let isStreaming = false;
      let activeAssistantIndex = null;

      function getThreadStore() {
        const raw = localStorage.getItem("codex.demo.threads");
        return raw ? JSON.parse(raw) : [];
      }

      function setThreadStore(list) {
        localStorage.setItem("codex.demo.threads", JSON.stringify(list));
      }

      function getMessages(threadId) {
        const raw = localStorage.getItem(`codex.demo.thread.${threadId}.messages`);
        return raw ? JSON.parse(raw) : [];
      }

      function setMessages(threadId, messages) {
        localStorage.setItem(`codex.demo.thread.${threadId}.messages`, JSON.stringify(messages));
      }

      function addThread(thread) {
        const list = getThreadStore();
        const existing = list.find((t) => t.id === thread.id);
        const updated = { ...thread, updatedAt: Date.now() };
        if (!existing) {
          list.unshift(updated);
        } else {
          Object.assign(existing, updated);
        }
        setThreadStore(list);
        renderThreadList();
      }

      function bumpThread(threadId) {
        const list = getThreadStore();
        const idx = list.findIndex((t) => t.id === threadId);
        if (idx !== -1) {
          list[idx].updatedAt = Date.now();
          const item = list.splice(idx, 1)[0];
          list.unshift(item);
          setThreadStore(list);
        }
      }

      function renderThreadList() {
        const list = getThreadStore().sort((a, b) => b.updatedAt - a.updatedAt);
        const start = currentPage * PAGE_SIZE;
        const page = list.slice(start, start + PAGE_SIZE);

        threadListEl.innerHTML = "";
        if (page.length === 0) {
          threadListEl.innerHTML = "<div class=\"muted\">No threads</div>";
          return;
        }

        page.forEach((item) => {
          const el = document.createElement("div");
          el.className = "thread-item" + (item.id === currentThreadId ? " active" : "");
          el.textContent = item.title || `Thread ${item.id.slice(0, 8)}`;
          el.addEventListener("click", () => loadThread(item.id));
          threadListEl.appendChild(el);
        });
      }

      function renderMessages() {
        chatArea.innerHTML = "";
        if (!currentThreadId) {
          chatArea.innerHTML = "<div class=\"muted\">No active thread.</div>";
          return;
        }

        const messages = getMessages(currentThreadId);
        messages.forEach((msg) => {
          const el = document.createElement("div");
          el.className = `msg ${msg.role}`;
          el.textContent = msg.content;
          chatArea.appendChild(el);
        });
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      async function postJson(path, body) {
        const res = await fetch(`${BASE_URL}${path}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error(`${path} failed: ${res.status}`);
        return res.json();
      }

      async function startBridge() {
        await fetch(`${BASE_URL}/bridge/start`, { method: "POST" });
        bridgeStatusEl.textContent = "Status: starting";
        await initializeWithRetry();
      }

      async function stopBridge() {
        await fetch(`${BASE_URL}/bridge/stop`, { method: "POST" });
        bridgeStatusEl.textContent = "Status: stopped";
      }

      async function initializeWithRetry() {
        for (let i = 0; i < 10; i++) {
          try {
            await postJson("/api/initialize", {});
            bridgeStatusEl.textContent = "Status: running";
            return;
          } catch (err) {
            await new Promise((r) => setTimeout(r, 400));
          }
        }
        bridgeStatusEl.textContent = "Status: failed";
      }

      async function newThread() {
        const data = await postJson("/api/thread/start", { cwd: "/home/ivan/github/codex" });
        currentThreadId = data.thread.id;
        threadInfo.textContent = `Active: ${currentThreadId}`;
        addThread({ id: currentThreadId, title: `Thread ${currentThreadId.slice(0, 8)}` });
        setMessages(currentThreadId, []);
        renderMessages();
      }

      async function loadThread(threadId) {
        currentThreadId = threadId;
        threadInfo.textContent = `Active: ${currentThreadId}`;
        await postJson("/api/thread/resume", { threadId });
        renderThreadList();
        renderMessages();
      }

      function appendMessage(role, content) {
        const messages = getMessages(currentThreadId);
        messages.push({ role, content, ts: Date.now() });
        setMessages(currentThreadId, messages);
        bumpThread(currentThreadId);
        renderMessages();
        return messages.length - 1;
      }

      function updateAssistantMessage(index, content) {
        const messages = getMessages(currentThreadId);
        if (!messages[index]) return;
        messages[index].content = content;
        setMessages(currentThreadId, messages);
        renderMessages();
      }

      async function sendMessage() {
        if (!currentThreadId || isStreaming) return;
        const content = messageInput.value.trim();
        if (!content) return;

        messageInput.value = "";
        appendMessage("user", content);
        activeAssistantIndex = appendMessage("assistant", "");
        isStreaming = true;

        const res = await fetch(`${BASE_URL}/api/turn/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ threadId: currentThreadId, message: content }),
        });

        if (!res.ok || !res.body) {
          isStreaming = false;
          throw new Error(`turn/start failed: ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let assistantText = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let idx;
          while ((idx = buffer.indexOf("\n\n")) !== -1) {
            const chunk = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);

            const lines = chunk.split("\n");
            const eventLine = lines.find((l) => l.startsWith("event:"));
            const dataLine = lines.find((l) => l.startsWith("data:"));
            if (!eventLine || !dataLine) continue;

            const event = eventLine.slice("event:".length).trim();
            const data = JSON.parse(dataLine.slice("data:".length).trim());

            if (event === "item/agentMessage/delta") {
              const delta = data.params?.delta ?? "";
              assistantText += delta;
              updateAssistantMessage(activeAssistantIndex, assistantText);
            }

            if (event === "item/tool/requestUserInput") {
              renderToolRequest(data.id, data.params?.questions || []);
            }

            if (event === "turn/completed") {
              isStreaming = false;
            }
          }
        }

        isStreaming = false;
      }

      function renderToolRequest(requestId, questions) {
        toolArea.innerHTML = "";
        const container = document.createElement("div");
        container.className = "row";

        const header = document.createElement("div");
        header.className = "mono";
        header.textContent = `requestId: ${JSON.stringify(requestId)}`;
        container.appendChild(header);

        const answers = {};

        questions.forEach((q) => {
          const qWrap = document.createElement("div");
          qWrap.className = "question";

          const title = document.createElement("div");
          title.textContent = `${q.header || "Question"}: ${q.question}`;
          qWrap.appendChild(title);

          const opts = document.createElement("div");
          opts.className = "options";

          (q.options || []).forEach((opt) => {
            const label = document.createElement("label");
            const input = document.createElement("input");
            input.type = q.multiple ? "checkbox" : "radio";
            input.name = q.id;
            input.value = opt.label;
            input.addEventListener("change", () => {
              const selected = Array.from(opts.querySelectorAll("input:checked"))
                .map((el) => el.value);
              answers[q.id] = selected;
            });
            label.appendChild(input);
            label.appendChild(document.createTextNode(` ${opt.label}: ${opt.description}`));
            opts.appendChild(label);
          });

          qWrap.appendChild(opts);
          container.appendChild(qWrap);
        });

        const sendBtn = document.createElement("button");
        sendBtn.textContent = "Submit Answers";
        sendBtn.addEventListener("click", async () => {
          await fetch(`${BASE_URL}/api/tool/answer`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ requestId, answers }),
          });
          toolArea.innerHTML = "<div class=\"muted\">Answers sent.</div>";
        });

        container.appendChild(sendBtn);
        toolArea.appendChild(container);
      }

      document.getElementById("startBridgeBtn").addEventListener("click", startBridge);
      document.getElementById("stopBridgeBtn").addEventListener("click", stopBridge);
      document.getElementById("newThreadBtn").addEventListener("click", newThread);
      document.getElementById("refreshThreadsBtn").addEventListener("click", renderThreadList);
      document.getElementById("prevPageBtn").addEventListener("click", () => {
        currentPage = Math.max(0, currentPage - 1);
        renderThreadList();
      });
      document.getElementById("nextPageBtn").addEventListener("click", () => {
        currentPage += 1;
        renderThreadList();
      });
      document.getElementById("sendBtn").addEventListener("click", sendMessage);
      document.getElementById("clearBtn").addEventListener("click", () => {
        if (!currentThreadId) return;
        setMessages(currentThreadId, []);
        renderMessages();
      });

      renderThreadList();
      renderMessages();
    </script>
  </body>
</html>
