name: siyuan-npm-linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: "npm package version"
        required: true
        default: "0.18.0-siyuan.1"

permissions:
  contents: read

jobs:
  build:
    name: Build Linux package - ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    env:
      VERSION: ${{ inputs.version }}
      TARGET: ${{ matrix.target }}
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_PROFILE_RELEASE_LTO: thin
      AWS_LC_SYS_NO_JITTER_ENTROPY: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runs_on: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runs_on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Use hermetic Cargo home
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0
          use-cache: false

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev linux-libc-dev libubsan1
          bash .github/scripts/install-musl-build-tools.sh

      - name: Configure rustc UBSan wrapper
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper="${RUNNER_TEMP}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - name: Clear sanitizer flags
        run: |
          set -euo pipefail
          sanitize_flags() {
            local input="$1"
            input="${input//-fsanitize=undefined/}"
            input="${input//-fno-sanitize-recover=undefined/}"
            input="${input//-fno-sanitize-trap=undefined/}"
            echo "$input"
          }

          cflags="$(sanitize_flags "${CFLAGS-}")"
          cxxflags="$(sanitize_flags "${CXXFLAGS-}")"
          echo "CFLAGS=${cflags}" >> "$GITHUB_ENV"
          echo "CXXFLAGS=${cxxflags}" >> "$GITHUB_ENV"

      - name: Configure musl rusty_v8 artifact overrides
        run: |
          set -euo pipefail
          version="$(python3 "${GITHUB_WORKSPACE}/.github/scripts/rusty_v8_bazel.py" resolved-v8-crate-version)"
          release_tag="rusty-v8-v${version}"
          base_url="https://github.com/openai/codex/releases/download/${release_tag}"
          archive="${base_url}/librusty_v8_release_${TARGET}.a.gz"
          binding_dir="${RUNNER_TEMP}/rusty_v8"
          binding_path="${binding_dir}/src_binding_release_${TARGET}.rs"
          mkdir -p "${binding_dir}"
          curl -fsSL "${base_url}/src_binding_release_${TARGET}.rs" -o "${binding_path}"
          echo "RUSTY_V8_ARCHIVE=${archive}" >> "$GITHUB_ENV"
          echo "RUSTY_V8_SRC_BINDING_PATH=${binding_path}" >> "$GITHUB_ENV"

      - name: Build canonical Codex package
        run: |
          set -euo pipefail
          cargo build \
            --manifest-path codex-rs/Cargo.toml \
            --target "$TARGET" \
            --release \
            --bin codex \
            --bin codex-linux-sandbox

          vendor_dir="dist/siyuan-vendor/$TARGET"
          mkdir -p "$vendor_dir/codex" "$vendor_dir/path"
          cp "codex-rs/target/$TARGET/release/codex" "$vendor_dir/codex/codex"
          cp "codex-rs/target/$TARGET/release/codex-linux-sandbox" "$vendor_dir/path/codex-linux-sandbox"

      - name: Smoke test native vendor package
        run: "dist/siyuan-vendor/$TARGET/codex/codex --version"

      - name: Upload vendor package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: siyuan-vendor-${{ matrix.target }}
          path: dist/siyuan-vendor

  publish:
    name: Publish Linux npm package
    needs: build
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          scope: "@ivanfeng3333"

      - name: Download vendor packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v5.0.0
        with:
          pattern: siyuan-vendor-*
          path: dist/siyuan-vendor
          merge-multiple: true

      - name: Stage npm tarball
        run: |
          set -euo pipefail
          python3 scripts/stage_siyuan_npm_package.py \
            --version "$VERSION" \
            --vendor-root dist/siyuan-vendor \
            --target x86_64-unknown-linux-musl \
            --target aarch64-unknown-linux-musl \
            --output-dir dist/siyuan-npm

      - name: Smoke test npm tarball
        run: |
          set -euo pipefail
          prefix="$RUNNER_TEMP/siyuan-codex-prefix"
          npm install -g "dist/siyuan-npm/siyuan-codex-npm-${VERSION}.tgz" --prefix "$prefix"
          "$prefix/bin/siyuan" --version
          "$prefix/bin/codex" --version

      - name: Upload npm tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: siyuan-codex-npm-${{ inputs.version }}
          path: dist/siyuan-npm/*.tgz

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "dist/siyuan-npm/siyuan-codex-npm-${VERSION}.tgz" --access public
