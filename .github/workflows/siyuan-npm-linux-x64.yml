name: siyuan-npm-linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: "npm package version"
        required: true
        default: "0.18.0-siyuan.1"

permissions:
  contents: read

jobs:
  build:
    name: Build Linux package - ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    env:
      VERSION: ${{ inputs.version }}
      TARGET: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runs_on: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runs_on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0
          use-cache: false

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev linux-libc-dev
          bash .github/scripts/install-musl-build-tools.sh

      - name: Build canonical Codex package
        run: |
          set -euo pipefail
          python3 scripts/build_codex_package.py \
            --target "$TARGET" \
            --variant codex \
            --cargo-profile release \
            --package-dir "dist/siyuan-vendor/$TARGET" \
            --force

      - name: Smoke test native vendor package
        run: "dist/siyuan-vendor/$TARGET/bin/codex --version"

      - name: Upload vendor package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: siyuan-vendor-${{ matrix.target }}
          path: dist/siyuan-vendor

  publish:
    name: Publish Linux npm package
    needs: build
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          scope: "@ivanfeng3333"

      - name: Download vendor packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v5.0.0
        with:
          pattern: siyuan-vendor-*
          path: dist/siyuan-vendor
          merge-multiple: true

      - name: Stage npm tarball
        run: |
          set -euo pipefail
          python3 scripts/stage_siyuan_npm_package.py \
            --version "$VERSION" \
            --vendor-root dist/siyuan-vendor \
            --target x86_64-unknown-linux-musl \
            --target aarch64-unknown-linux-musl \
            --output-dir dist/siyuan-npm

      - name: Smoke test npm tarball
        run: |
          set -euo pipefail
          prefix="$RUNNER_TEMP/siyuan-codex-prefix"
          npm install -g "dist/siyuan-npm/siyuan-codex-npm-${VERSION}.tgz" --prefix "$prefix"
          "$prefix/bin/siyuan" --version
          "$prefix/bin/codex" --version

      - name: Upload npm tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: siyuan-codex-npm-${{ inputs.version }}
          path: dist/siyuan-npm/*.tgz

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "dist/siyuan-npm/siyuan-codex-npm-${VERSION}.tgz" --access public
